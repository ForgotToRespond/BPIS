<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPIS-120 临床级无聊倾向性与多维心理测评</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(255, 255, 255, 0.6);
            --accent-color: #0066cc;
            --hover-bg: rgba(0, 102, 204, 0.08);
            --progress-bg: #e5e5ea;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-primary: #f5f5f7;
                --text-secondary: #a1a1a6;
                --card-bg: rgba(28, 28, 30, 0.8);
                --card-border: rgba(255, 255, 255, 0.12);
                --accent-color: #2997ff;
                --hover-bg: rgba(41, 151, 255, 0.15);
                --progress-bg: #3a3a3c;
            }
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro', 'PingFang SC', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(0,102,204,0.15) 0%, transparent 60%);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 30px 20px 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--card-border);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .progress-container {
            width: 90%;
            max-width: 600px;
            margin: 15px auto 5px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: var(--progress-bg);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
        }

        #test-container {
            width: 100%;
            max-width: 620px;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .question-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 32px 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .question-title {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .options label {
            display: flex;
            align-items: center;
            padding: 16px;
            margin: 12px 0;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .options label:hover {
            background: var(--hover-bg);
            border-color: var(--accent-color);
        }

        input[type="radio"] {
            margin-right: 14px;
            accent-color: var(--accent-color);
            width: 18px;
            height: 18px;
        }

        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 30px;
            border-radius: 16px;
            max-width: 420px;
            width: 85%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .btn-primary, .btn-secondary {
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            font-weight: 500;
            margin: 10px 5px 0;
            transition: opacity 0.2s;
        }

        .btn-primary { background: var(--accent-color); color: white; }
        .btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--text-secondary); }

        #loading, #result-container {
            display: none;
            text-align: center;
            margin-top: 25vh;
            padding: 0 20px;
        }

        .spinner {
            border: 3px solid var(--card-border);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .punchline {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.5;
        }
        .punchline span { display: block; font-size: 4.5rem; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header id="header">
        <h1>BPIS-120 多维心理倾向综合量表</h1>
        <div class="progress-container">
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <div class="progress-text">
                <span id="progress-count">进度: 1 / 120</span>
                <span id="progress-percent">0%</span>
            </div>
        </div>
    </header>

    <div id="test-container">
        <div id="card-area"></div>
    </div>

    <div class="modal-overlay" id="warning-modal">
        <div class="modal-box">
            <h3 style="margin-top:0; color:#e74c3c;">⚠️ 测验信效度提示</h3>
            <p style="font-size:0.95rem; line-height:1.6; color:var(--text-primary);">
                系统通过反应时检测与数据方差分析发现，您在 120 道题中有 <strong id="default-count-text" style="color:#e74c3c;">0</strong> 道直接保持了默认选项。
            </p>
            <p style="font-size:0.85rem; color:var(--text-secondary);">
                过于高频的默认选项会导致克罗恩巴赫α系数（Cronbach's α）过低，无法构建精准的心理评估图谱。<strong>强烈推荐您重新认真思考并作答！</strong>
            </p>
            <div style="margin-top:25px;">
                <button class="btn-primary" onclick="restartTest()">重新认真做题</button>
                <button class="btn-secondary" onclick="forceSubmit()">强行生成报告</button>
            </div>
        </div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <h2>正在通过 120 维拓扑矩阵分析您的答题数据...</h2>
        <p style="color:var(--text-secondary);">正在校准常模样本数据库，请耐心等待</p>
    </div>

    <div id="result-container">
        <div class="punchline">
            <span>🤡</span>
            你都无聊到把这120道题全点完了<br>
            还不知道自己无不无聊吗？
        </div>
    </div>

    <script>
        // --- 1. 自动化构建 120 道逼格满满的临床测试题 ---
        const dimensions = ["认知专注与心流体验", "时间感知与内熵流速", "感官阈值与刺激寻求", "存在主义与自我觉察", "社交能量与互动效价", "重复作业耐受度评估"];
        const subjects = [
            "在处理日常高度重复性的行政或学业任务时，", "当处在一个完全没有任何电子设备与外界联络的封闭空间达45分钟时，",
            "面对长篇且结构严密的专业学术文献或深度报道时，", "在参与持续时间超过1.5小时且互动低频的线上会议或课堂时，",
            "在周末或长假期缺乏外部设定目标或强制打卡要求的情境下，", "当遭遇交通阻塞或排队等候，且预估等待时间超过20分钟时，",
            "回顾过去30天内自己每天主要精力消耗的具体事件时，", "当与刚结识的社交对象进行超过10分钟的表层寒暄（如天气、工作）时，",
            "在深夜独处并回顾当前生活轨道的重复性与可预测性时，", "当试图启动一项已经计划了很久但需要高度用脑的新技能学习时，"
        ];
        const reactions = [
            { q: "您对自身专注力发散（即走神）的控制力度感受为？", opts: ["极难控制，频繁不由自主地游离", "能够意识到走神并主动将其拉回", "可以较轻易地维持沉浸专注状态"] },
            { q: "您的核心心理体验更倾向于以下哪种状态？", opts: ["弥漫性的焦躁、空虚与坐立不安", "情绪平淡，但稍微感到时间变慢", "充实且平和，能够自我引发思考"] },
            { q: "您试图通过外部强烈刺激（如高频短视频、暴饮暴食、极限运动）打破现状的意向频率是？", opts: ["高频极度渴望，觉得难以忍受平淡", "偶尔会寻找部分外部消遣来进行中和", "基本不需要，内在自洽度完全足够"] },
            { q: "您评估当下“自我价值感知力”与“存在意义感”的清晰程度为？", opts: ["高度模糊，觉得当前行动缺乏实质意义", "中等清晰，基本明确阶段性功能目标", "极其坚定，对当下行为价值有深刻认同"] }
        ];

        const questionsData = [];
        let count = 0;
        for (let i = 0; i < dimensions.length; i++) {
            for (let j = 0; j < subjects.length; j++) {
                for (let k = 0; k < reactions.length; k++) {
                    if (count < 120) {
                        questionsData.push({
                            tag: dimensions[i] + ` (维序 #${count + 1})`,
                            q: subjects[j] + reactions[k].q,
                            opts: reactions[k].opts
                        });
                        count++;
                    }
                }
            }
        }

        // --- 2. 状态管理 ---
        let currentStep = 0;
        let defaultChoiceCount = 0; // 记录直接点默认选项的次数

        const cardArea = document.getElementById('card-area');
        const progressFill = document.getElementById('progress-fill');
        const progressCount = document.getElementById('progress-count');
        const progressPercent = document.getElementById('progress-percent');

       function renderQuestion(index) {
            const item = questionsData[index];
            
            // 更新进度条
            const percent = Math.round(((index + 1) / 120) * 100);
            progressFill.style.width = `${percent}%`;
            progressCount.innerText = `进度: ${index + 1} / 120`;
            progressPercent.innerText = `${percent}%`;

            // 【修复关键】：将 onclick 绑定到 input 上，避免 label 默认行为导致的事件双重触发
            let optionsHTML = '';
            item.opts.forEach((opt, optIndex) => {
                optionsHTML += `
                    <label>
                        <input type="radio" name="q${index}" value="${optIndex}" onclick="handleSelect(${optIndex})" ${optIndex === 0 ? 'checked' : ''}>
                        ${opt}
                    </label>
                `;
            });

            cardArea.innerHTML = `
                <div class="question-card">
                    <div class="question-tag">${item.tag}</div>
                    <div class="question-title">${index + 1}. ${item.q}</div>
                    <div class="options">${optionsHTML}</div>
                </div>
            `;
        }
            cardArea.innerHTML = `
                <div class="question-card">
                    <div class="question-tag">${item.tag}</div>
                    <div class="question-title">${index + 1}. ${item.q}</div>
                    <div class="options">${optionsHTML}</div>
                </div>
            `;
        }

        function handleSelect(selectedIndex) {
            // 如果用户选的是默认的第一项（0），计入懒人次数
            if (selectedIndex === 0) {
                defaultChoiceCount++;
            }

            // 稍微延迟一下给用户反馈动画，然后跳下一题
            setTimeout(() => {
                currentStep++;
                if (currentStep < 120) {
                    renderQuestion(currentStep);
                } else {
                    finishTest();
                }
            }, 250);
        }

        function finishTest() {
            // 如果超过65% (78题) 没有改变初始项，弹出警告！
            if (defaultChoiceCount > 78) {
                document.getElementById('default-count-text').innerText = defaultChoiceCount;
                document.getElementById('warning-modal').style.display = 'flex';
            } else {
                showResult();
            }
        }

        function restartTest() {
            document.getElementById('warning-modal').style.display = 'none';
            currentStep = 0;
            defaultChoiceCount = 0;
            renderQuestion(0);
        }

        function forceSubmit() {
            document.getElementById('warning-modal').style.display = 'none';
            showResult();
        }

        function showResult() {
            document.getElementById('header').style.display = 'none';
            document.getElementById('test-container').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            window.scrollTo(0, 0);

            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('result-container').style.display = 'block';
            }, 3000);
        }

        // 初始化第一题
        renderQuestion(0);
    </script>
</body>
</html>
